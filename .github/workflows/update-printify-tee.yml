name: Update Printify Tee Draft

# Manual-only. This workflow is intentionally NOT triggered on push,
# pull_request, or schedule — it must be invoked from the Actions tab so
# every Printify mutation is an explicit human action.
on:
  workflow_dispatch:
    inputs:
      shop_id:
        description: Printify shop ID
        required: true
        default: "13010147"
      product_id:
        description: Printify product ID for the tee draft
        required: true
        default: "6a175525616126f69b0afb31"
      front_image:
        description: Path to the front artwork PNG (relative to repo root)
        required: true
        default: "artwork/front/one_fourteen_front_neon.png"
      back_image:
        description: Path to the back artwork PNG (relative to repo root)
        required: true
        default: "artwork/back/one_fourteen_back_badge_cream.png"
      title:
        description: Product title to set on the draft
        required: true
        default: "One Fourteen Neon 114 Whiskey Row Tee"
      dry_run:
        description: "true = fetch + plan only, no API writes"
        required: true
        default: "false"

permissions:
  contents: read

concurrency:
  group: update-printify-tee
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Do not run on forks. Inputs come from a maintainer with write
    # access who manually dispatched the workflow.
    if: github.repository == 'Chefzo/114-whiskey-row-merch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify artwork files exist
        run: |
          test -f "${{ inputs.front_image }}" || { echo "Missing front image: ${{ inputs.front_image }}"; exit 1; }
          test -f "${{ inputs.back_image }}"  || { echo "Missing back image: ${{ inputs.back_image }}"; exit 1; }

      - name: Update Printify tee draft
        id: update_printify
        env:
          # Secret is injected only into this step. It is never echoed,
          # never written to disk, and never passed on the command line.
          # In dry-run mode the secret is intentionally not required, so
          # maintainers can preview the planned update without it.
          PRINTIFY_API_TOKEN: ${{ secrets.PRINTIFY_API_TOKEN }}
        run: |
          extra=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            extra="--dry-run"
          else
            if [ -z "${PRINTIFY_API_TOKEN:-}" ]; then
              echo "PRINTIFY_API_TOKEN repository secret is not set." >&2
              echo "Add it in Settings -> Secrets and variables -> Actions." >&2
              exit 2
            fi
          fi
          python scripts/update_printify_tee.py \
            --shop-id "${{ inputs.shop_id }}" \
            --product-id "${{ inputs.product_id }}" \
            --front "${{ inputs.front_image }}" \
            --back  "${{ inputs.back_image }}" \
            --title "${{ inputs.title }}" \
            $extra

      - name: Summarize Printify failure
        if: always() && hashFiles('printify-update-diagnostic.json') != ''
        run: |
          # The diagnostic file is written by the script and is already
          # sanitized: it never contains the token or request headers.
          # We just surface a few fields into the run summary so a
          # maintainer can triage without downloading the artifact.
          python - <<'PY'
          import json, os, pathlib
          path = pathlib.Path("printify-update-diagnostic.json")
          try:
              data = json.loads(path.read_text())
          except Exception as exc:
              print(f"Could not parse diagnostic: {exc}")
              raise SystemExit(0)
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          lines = [
              "## Printify update failed",
              "",
              f"- **Stage:** `{data.get('stage')}`",
              f"- **HTTP status:** `{data.get('http_status')}`",
              f"- **HTTP reason:** `{data.get('http_reason')}`",
              f"- **Printify error code:** `{data.get('printify_error_code')}`",
              f"- **Printify error message:** {data.get('printify_error_message')!r}",
              "",
              "See the `printify-update-diagnostic` artifact for the full sanitized body snippet.",
          ]
          text = "\n".join(lines) + "\n"
          if summary_path:
              with open(summary_path, "a") as fh:
                  fh.write(text)
          print(text)
          PY

      - name: Upload Printify diagnostic
        if: always() && hashFiles('printify-update-diagnostic.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: printify-update-diagnostic
          path: printify-update-diagnostic.json
          if-no-files-found: ignore
          retention-days: 14
